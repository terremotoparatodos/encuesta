<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Encuesta Pokémon</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --card: #111827;
    --card2: #1a2235;
    --border: #2a3a55;
    --accent: #facc15;
    --accent2: #f97316;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #22c55e;
    --error: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 60px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(250,204,21,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(249,115,22,0.05) 0%, transparent 50%);
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 8vw, 72px);
    letter-spacing: 3px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pokeball-icon {
    width: 60px;
    height: 60px;
    margin: 0 auto 16px;
    display: block;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
  }

  .name-field {
    margin-bottom: 32px;
  }

  .name-field label {
    display: block;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .name-field input {
    width: 100%;
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 700;
    transition: border-color 0.2s;
    outline: none;
  }

  .name-field input:focus {
    border-color: var(--accent);
  }

  .questions-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .q-item {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }

  .q-item:hover {
    border-color: rgba(250,204,21,0.3);
    transform: translateX(3px);
  }

  .q-item.valid {
    border-color: rgba(34,197,94,0.4);
  }

  .q-item.invalid {
    border-color: rgba(239,68,68,0.5);
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .q-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .q-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .q-input-wrap {
    position: relative;
  }

  .q-item input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px 11px 40px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.2s;
  }

  .q-item input:focus {
    border-color: var(--accent);
  }

  .q-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    pointer-events: none;
  }

  .check-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .q-item.valid .check-icon {
    opacity: 1;
  }

  .submit-wrap {
    margin-top: 28px;
  }

  .btn-submit {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #0a0f1e;
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-submit:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-2px);
  }

  .btn-submit:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-submit .loading {
    display: none;
  }

  .btn-submit.sending .label { display: none; }
  .btn-submit.sending .loading { display: inline; }

  .msg {
    margin-top: 18px;
    padding: 16px 20px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 15px;
    text-align: center;
    display: none;
  }

  .msg.success {
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.4);
    color: var(--success);
    display: block;
  }

  .msg.error {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.35);
    color: var(--error);
    display: block;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
    margin-bottom: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
</style>
</head>

qDiv.innerHTML = QUESTIONS.map((q, i) => `
  <div class="q-item" id="qi${i}">
    <div class="q-number">Pregunta ${i+1}</div>
    <div class="q-text">${q}</div>
    <div class="q-input-wrap">
      <span class="q-icon">${EMOJIS[i]}</span>
      <input
        list="pokemonList"
        data-index="${i}"
        id="q${i}"
        placeholder="Escribí un Pokémon..."
        autocomplete="off"
        oninput="onInput(${i})"
      >
      <span class="check-icon">✅</span>
    </div>
  </div>
`).join("");

let completedCount = 0;

function onInput(i) {
  const input = document.getElementById(`q${i}`);
  const item = document.getElementById(`qi${i}`);
  const val = input.value.trim();
  const isValid = pokemonSet.has(val.toLowerCase());

  const wasValid = item.classList.contains('valid');

  item.classList.remove('valid', 'invalid');
  if (val === '') {
    // neutral
  } else if (isValid) {
    item.classList.add('valid');
  } else {
    // don't mark invalid while typing
  }

  updateProgress();
}

function updateProgress() {
  let count = 0;
  for (let i = 0; i < QUESTIONS.length; i++) {
    const val = document.getElementById(`q${i}`).value.trim();
    if (pokemonSet.has(val.toLowerCase())) count++;
  }
  completedCount = count;
  const pct = (count / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${count} / ${QUESTIONS.length} completadas`;
}

async function send() {
  const btn = document.getElementById('btnSubmit');
  const msg = document.getElementById('msg');
  msg.className = 'msg';
  msg.style.display = 'none';

  // Validate all
  let hasError = false;
  const answers = {};

  for (let i = 0; i < QUESTIONS.length; i++) {
    const input = document.getElementById(`q${i}`);
    const item = document.getElementById(`qi${i}`);
    const val = input.value.trim();

    if (!pokemonSet.has(val.toLowerCase())) {
      item.classList.remove('valid');
      item.classList.add('invalid');
      // re-trigger animation
      void item.offsetWidth;
      item.classList.add('invalid');
      hasError = true;
    } else {
      item.classList.add('valid');
      answers[`q${i+1}`] = val;
    }
  }

  if (hasError) {
    msg.textContent = '⚠️ Completá todas las preguntas con nombres válidos.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    return;
  }

  const nombre = document.getElementById('username').value.trim() || 'Anónimo';
  const payload = { nombre, ...answers };

  btn.disabled = true;
  btn.classList.add('sending');

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/encuesta_pokemon`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });

    if (res.ok || res.status === 201) {
      msg.textContent = '🎉 ¡Gracias por participar! Tu respuesta fue guardada.';
      msg.className = 'msg success';
      msg.style.display = 'block';
      btn.textContent = '✅ Enviado';
      btn.style.background = 'var(--success)';
      // disable all inputs
      document.querySelectorAll('input').forEach(i => i.disabled = true);
    } else {
      const err = await res.text();
      throw new Error(err);
    }
  } catch (e) {
    msg.textContent = '❌ Error al enviar. Intentá de nuevo.';
    msg.className = 'msg error';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.classList.remove('sending');
    console.error(e);
  }
}
</script>
</body>
</html>
